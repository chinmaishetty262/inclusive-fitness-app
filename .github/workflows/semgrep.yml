name: Semgrep SAST Scan

on:
  push:
    branches:
      - main
      - preprod

  pull_request:
    branches:
      - main
      - preprod

jobs:
  semgrep:
    name: Run Semgrep Security Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: p/security-audit